name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: agent-gateway-linux
            asset_name: agent-gateway-linux-amd64
            ext: ''
          - os: macos-latest
            artifact_name: agent-gateway-macos
            asset_name: agent-gateway-macos-amd64
            ext: ''
          - os: windows-latest
            artifact_name: agent-gateway-windows
            asset_name: agent-gateway-windows-amd64
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e ".[desktop]"

      - name: Install PyInstaller
        run: uv pip install pyinstaller procstream

      - name: Build executable
        run: uv run pyinstaller agent_gateway.spec --clean

      - name: Rename artifact
        run: |
          mv dist/agent-gateway${{ matrix.ext }} dist/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/agent-gateway-linux/agent-gateway-linux-amd64
            artifacts/agent-gateway-macos/agent-gateway-macos-amd64
            artifacts/agent-gateway-windows/agent-gateway-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}