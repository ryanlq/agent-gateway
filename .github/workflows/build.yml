name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: agent-gateway-linux
            asset_name: agent-gateway-linux-amd64
            ext: ''
          - os: macos-latest
            artifact_name: agent-gateway-macos
            asset_name: agent-gateway-macos-amd64
            ext: ''
          - os: windows-latest
            artifact_name: agent-gateway-windows
            asset_name: agent-gateway-windows-amd64.exe
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          # Install every platform extra so PyInstaller can freeze all adapter
          # SDKs (lark-oapi, telegram, discord, slack, …) into the sidecar.
          # The shipped binary has no runtime pip — adapters the UI exposes
          # must be bundled at build time or they report
          # "Dependencies not installed" in production.
          pip install -e ".[all]"
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller agent_gateway.spec --clean

      - name: Rename artifact
        run: |
          mv dist/agent-gateway${{ matrix.ext }} dist/${{ matrix.asset_name }} || move dist/agent-gateway${{ matrix.ext }} dist/${{ matrix.asset_name }}

      - name: Smoke-test frozen binary (adapter SDKs)
        # The shipped sidecar has no runtime pip — run --check-adapters against
        # the just-built binary so an SDK that failed to freeze fails the build
        # here, instead of shipping and reporting "Dependencies not installed"
        # in production (the Feishu regression class).
        run: ./dist/${{ matrix.asset_name }} --check-adapters

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/agent-gateway-linux/agent-gateway-linux-amd64
            artifacts/agent-gateway-macos/agent-gateway-macos-amd64
            artifacts/agent-gateway-windows/agent-gateway-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}